<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stockholm Golf Price Dashboard</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="hero">
      <img class="hero__image" src="assets/stockholm-golf-banner.png" alt="">
      <div class="hero__shade"></div>
      <div class="hero__content">
        <p class="eyebrow">Stockholm's best golf courses (not include Bro Hof and Golf Star)</p>
        <h1>Cheapest known prices for the next 60 days</h1>
        <div class="hero__meta">
          <span id="dateRange">Loading dates...</span>
          <span id="dataQuality">update at 21:00 everyday</span>
        </div>
      </div>
    </header>

    <main class="shell">
      <section class="stats" aria-label="Summary">
        <article>
          <span class="stat__label">Courses</span>
          <strong id="courseCount">0</strong>
        </article>
        <article>
          <span class="stat__label">Priced</span>
          <strong id="pricedCount">0</strong>
        </article>
        <article>
          <span class="stat__label">Best price</span>
          <strong id="bestPrice">-</strong>
        </article>
        <article>
          <span class="stat__label">Rows in window</span>
          <strong id="rowCount">0</strong>
        </article>
      </section>

      <section class="notice" id="notice" hidden></section>

      <section class="board" aria-label="Golf course prices">
        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th>Course</th>
                <th>Area</th>
                <th>Cheapest</th>
                <th>Date</th>
                <th>Time</th>
                <th>Holes</th>
                <th>Source</th>
                <th>60-day view</th>
              </tr>
            </thead>
            <tbody id="courseRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
